[changelog]
header = "# Changelog\n\nNewest releases appear first.\n"
body = """
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}

### Changes
{% for commit in commits -%}
- {{ commit.message | split(pat="\n") | first | trim }}
{% endfor %}
"""
trim = true
footer = ""
postprocessors = []

[git]
conventional_commits = false
filter_unconventional = false
filter_commits = true
tag_pattern = "v[0-9].*"
topo_order = false
sort_commits = "newest"

[[git.commit_parsers]]
message = "^chore: bump"
skip = true

[[git.commit_parsers]]
message = "^chore: release"
skip = true

[[git.commit_parsers]]
message = "^chore: promote"
skip = true

[[git.commit_parsers]]
message = "^docs: DEV_LOG"
skip = true

[[git.commit_parsers]]
message = "^- "
skip = true

[[git.commit_parsers]]
message = "^Merge"
skip = true

[[git.commit_parsers]]
message = ".*"
group = "Changes"
