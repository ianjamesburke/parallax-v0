# Video generation models. All routed through OpenRouter.
#
# Defaults are image-to-video; `capabilities.start_frame` flags i2v support
# and `capabilities.end_frame` flags end-frame conditioning. Models without
# either capability are text-to-video only.
#
# Pricing note: Seedance 2.0 Fast is resolution-tiered. Parallax defaults to
# generating at 480p (animate_resolution) and upscaling to the output
# resolution during ffmpeg assembly. The `cost` below reflects the 480p rate.
# Override animate_resolution: in the plan to change the generation resolution.
#   Seedance 2.0 Fast:  480p = $0.054/s | 720p = $0.121/s | 1080p = $0.272/s
#   Kling Video O1:     flat = $0.112/s (no resolution tiers)
#   Veo 3.1:            1080p+audio = $0.40/s | 1080p no-audio = $0.20/s | 4K = $0.60/s
#   Wan 2.7:            flat = $0.10/s
#   Sora 2 Pro:         720p = $0.30/s | 1080p = $0.50/s

- alias: draft
  model_id: openrouter/bytedance/seedance-2.0-fast
  tier: draft
  cost: 0.054
  unit: second
  description: "ByteDance Seedance 2.0 Fast. Resolution-tiered: $0.054/s at 480p (default), $0.121/s at 720p, $0.272/s at 1080p."
  fallback: mid
  capabilities:
    aspect_ratios: ["9:16", "16:9", "1:1"]
    resolutions: ["480p", "720p", "1080p"]
    native_resolution: "480p"
    start_frame: true
    end_frame: true
  inputs: []

- alias: mid
  model_id: openrouter/kwaivgi/kling-video-o1
  tier: mid
  cost: 0.112
  unit: second
  description: Kling Video O1. Strong motion and prompt adherence. Flat $0.112/s regardless of resolution.
  fallback: draft
  capabilities:
    aspect_ratios: ["9:16", "16:9", "1:1"]
    start_frame: true
    end_frame: true
  inputs: []

- alias: premium
  model_id: openrouter/google/veo-3.1
  tier: premium
  cost: 0.40
  unit: second
  description: "Google Veo 3.1. $0.40/s at 1080p with audio, $0.20/s without audio, $0.60/s at 4K."
  fallback: mid
  capabilities:
    aspect_ratios: ["9:16", "16:9", "1:1"]
    resolutions: ["1080p", "4K"]
    start_frame: true
    end_frame: true
  inputs: []

